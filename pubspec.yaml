name: s11_app_flutter_fventas
description: "App Fuerza de Ventas — Banco Andino. Oficiales de credito en campo."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Estado (MVVM: ViewModel = StateNotifier) ---
  flutter_riverpod: ^2.6.1

  # --- Backend remoto: Supabase / API REST ---
  http: any
  supabase_flutter: ^2.8.4

  # --- Persistencia local / offline-first ---
  sqflite: any
  path: any
  flutter_secure_storage: any

  # --- Navegacion ---
  go_router: any

  # --- Red y formato ---
  connectivity_plus: any
  intl: any

  # --- Acciones del dispositivo (marcador telefonico, RF-29) ---
  url_launcher: any

  # --- Graficos (M11 reportes) ---
  fl_chart: any

  # --- Captura de fotos de documentos (M6) ---
  image_picker: any
  image: any  # validacion de nitidez (varianza de Laplaciano, RF-54)

  # --- PDF de estado para compartir (M9 / RF-71) ---
  pdf: 3.11.3
  printing: ^5.14.3

  # --- GPS de gestiones (M10/RF-77) y alerta de compromiso (RF-78) ---
  geolocator: any
  flutter_local_notifications: ^17.2.4
  timezone: any  # zonedSchedule de la alerta de compromiso (RF-78)

  # --- Mapa de ruta (M2 / RF-19) ---
  google_maps_flutter: any

  # --- Geocodificacion inversa de la ubicacion del negocio (HU-10 / RF-26) ---
  geocoding: any

  # --- Sincronizacion nocturna de cartera en background (HU-05 / RF-13) ---
  workmanager: ^0.7.0

  # =====================================================================
  # Dependencias por modulo — se habilitan al implementar cada feature.
  # Requieren config nativa adicional (API keys, permisos, google-services).
  # Mantener comentadas evita romper el build mientras no se usan.
  # ---------------------------------------------------------------------
  # M2 Ruta:
  #   google_maps_flutter: any   # API key en AndroidManifest
  #   geolocator: any
  #   geocoding: any
  # M6 Documentos:
  #   camera: any               # permisos de camara
  #   image_picker: any
  #   image: any
  # M3/M11 Graficos:
  #   fl_chart: any
  # M5/M7 Firma:
  #   signature: any
  # M8/M9 PDF:
  #   pdf: any
  #   printing: any
  # M5/M9 Notificaciones:
  #   flutter_local_notifications: any
  #   firebase_core: any         # google-services.json obligatorio
  #   firebase_messaging: any
  # M1 Sincronizacion nocturna:
  #   workmanager: any
  # =====================================================================

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: any
  flutter_native_splash: any

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.jpg"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo.jpg"
  android: true
  ios: true
